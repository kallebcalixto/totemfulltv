<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBS TV - Ultra Lite & Anti-Freeze</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <style>
        /* Otimização de Performance: GPU Rendering */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-backface-visibility: hidden; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
        
        .admin-layer { position: absolute; overflow: hidden; display: block; }

        /* --- AJUSTE DO PLAYER --- */
        .video-js { width: 100% !important; height: 100% !important; }
        .vjs-tech { object-fit: fill !important; } 
        /* Remove elementos de interface para poupar CPU */
        .vjs-big-play-button, .vjs-loading-spinner, .vjs-control-bar { display: none !important; }

        /* --- AJUSTE DA GRADE --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(4, 1fr); 
            gap: 1px; 
            background: #000;
            width: 100%;
            height: 100%;
        }
        .quadrado { 
            background: #050505; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        img { width: 100%; height: 100%; object-fit: fill; display: block; }
    </style>
</head>
<body onclick="p1.play(); p2.play(); p1.muted(false);">

    <div id="v-layer" class="admin-layer">
        <video id="vid1" class="video-js vjs-default-skin" playsinline preload="auto"></video>
    </div>
    
    <div id="vb-layer" class="admin-layer">
        <video id="vid2" class="video-js vjs-default-skin" playsinline muted loop autoplay></video>
    </div>
    
    <div id="g-layer" class="admin-layer">
        <div class="grid" id="gradePrincipal"></div>
    </div>

<script>
    // Inicialização Firebase (Mantendo suas chaves originais)
    const mkt = firebase.initializeApp({
        apiKey: "AIzaSyBh-dhSMEgVO0dPyPdE-JAtPb2LeKaq9og",
        databaseURL: "https://marketing-19f3d-default-rtdb.firebaseio.com"
    }, "mktApp").database();

    const lay = firebase.initializeApp({ 
        databaseURL: "https://totem-full-tv-default-rtdb.firebaseio.com" 
    }, "layApp").database();

    const ORIGINAL_URL = "https://srv3.zcast.com.br/kbstv/kbstv/playlist.m3u8";

    // --- CONFIGURAÇÃO PLAYER 1 (ESTABILIDADE TOTAL) ---
    const p1 = videojs('vid1', {
        controls: false,
        autoplay: true,
        html5: {
            vhs: {
                enableLowInitialPlaylist: true, // Começa leve para não travar
                fastQualityChange: true,
                overrideNative: true
            }
        }
    });

    const p2 = videojs('vid2', { controls: false, autoplay: true, loop: true });

    function reloadStream() {
        console.warn("Watchdog: Reiniciando stream para evitar travamento.");
        p1.src({ src: ORIGINAL_URL, type: "application/x-mpegURL" });
        p1.play().then(() => {
            p1.muted(false);
        }).catch(() => {
            p1.muted(true);
        });
    }

    // WATCHDOG: Se o tempo do vídeo não mudar em 4 segundos, reinicia
    let lastTime = -1;
    setInterval(() => {
        if (!p1.paused()) {
            const currentTime = p1.currentTime();
            if (currentTime === lastTime) {
                reloadStream();
            }
            lastTime = currentTime;
        }
    }, 4000);

    // Reset preventivo a cada 5 minutos (limpeza de memória)
    setInterval(reloadStream, 300000);

    p1.on("error", () => setTimeout(reloadStream, 2000));
    reloadStream();

    // --- LÓGICA DA GRADE DE ANÚNCIOS ---
    let anuncios = [];
    let slideIdx = Array(17).fill(0);
    const grade = document.getElementById('gradePrincipal');
    for(let i=1; i<=16; i++) { grade.innerHTML += `<div class="quadrado" id="q${i}"></div>`; }

    mkt.ref('anuncios').on('value', snap => {
        anuncios = []; 
        snap.forEach(c => { anuncios.push(c.val()); });
        atualizar(); 
    });

    function atualizar() {
        const now = new Date();
        const h = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', hour12: false, timeZone: 'America/Sao_Paulo'});
        const d = now.getDay();
        for(let i=1; i<=16; i++) {
            const box = document.getElementById(`q${i}`);
            const ativos = anuncios.filter(a => parseInt(a.pos) === i && a.days.includes(d) && (h >= a.start && h <= a.end));
            if (ativos.length > 0) {
                box.innerHTML = `<img src="${ativos[slideIdx[i] % ativos.length].url}">`;
            } else { box.innerHTML = ""; }
        }
    }
    setInterval(atualizar, 1000);
    setInterval(() => { for(let i=1; i<=16; i++) slideIdx[i]++; atualizar(); }, 15000);

    // --- SINCRONIA ADMIN (LAYOUT) ---
    lay.ref('layout_totem').on('value', snap => {
        const s = snap.val(); if(!s) return;
        const mover = (id, d) => {
            const el = document.getElementById(id);
            if(!d || !el) return;
            el.style.left = d.x + "%"; 
            el.style.top = d.y + "%";
            el.style.width = d.w + "%"; 
            el.style.height = d.h + "%";
            el.style.transform = `rotate(${d.r || 0}deg)`;
        };
        mover('v-layer', s.video);
        mover('g-layer', s.grade);
        mover('vb-layer', s.vidBanner);

        if(s.vidBanner?.url && p2.src() !== s.vidBanner.url) {
            p2.src({ src: s.vidBanner.url, type: s.vidBanner.url.includes('m3u8') ? "application/x-mpegURL" : "video/mp4" });
        }
    });
</script>
</body>
</html>
